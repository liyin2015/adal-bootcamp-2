<svg width="900" height="420" viewBox="0 0 900 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#FF5898"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="16" font-weight="700" opacity="0.6">The bottleneck always moves</text>

  <!-- Bottleneck stages -->
  <!-- Coding -->
  <rect x="20" y="70" width="160" height="70" rx="10" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <text x="100" y="98" text-anchor="middle" fill="#888" font-family="system-ui" font-size="15" font-weight="600">Coding</text>
  <text x="100" y="118" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="12">Cursor</text>

  <!-- Arrow -->
  <line x1="185" y1="105" x2="220" y2="105" stroke="url(#arrowGrad)" stroke-width="2"/>
  <polygon points="225,105 218,100 218,110" fill="#888"/>

  <!-- Planning -->
  <rect x="230" y="70" width="160" height="70" rx="10" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <text x="310" y="98" text-anchor="middle" fill="#888" font-family="system-ui" font-size="15" font-weight="600">Planning</text>
  <text x="310" y="118" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="12">Claude Code</text>

  <!-- Arrow -->
  <line x1="395" y1="105" x2="430" y2="105" stroke="url(#arrowGrad)" stroke-width="2"/>
  <polygon points="435,105 428,100 428,110" fill="#aaa"/>

  <!-- Verification -->
  <rect x="440" y="70" width="160" height="70" rx="10" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="520" y="98" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="15" font-weight="600">Verification</text>
  <text x="520" y="118" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="12">OpenCode</text>

  <!-- Arrow -->
  <line x1="605" y1="105" x2="640" y2="105" stroke="url(#arrowGrad)" stroke-width="2"/>
  <polygon points="645,105 638,100 638,110" fill="#FF5898"/>

  <!-- Taste (current bottleneck) -->
  <rect x="650" y="55" width="200" height="100" rx="12" fill="#FF5898" opacity="0.15" stroke="#FF5898" stroke-width="2"/>
  <text x="750" y="90" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="18" font-weight="800">Taste</text>
  <text x="750" y="112" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">AdaL</text>
  <text x="750" y="130" text-anchor="middle" fill="#ccc" font-family="system-ui" font-size="10">the current bottleneck</text>

  <!-- Labels under stages -->
  <text x="100" y="160" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">solved by AI</text>
  <text x="310" y="160" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">solved by context</text>
  <text x="520" y="160" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">solved by loops</text>
  <text x="750" y="160" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="10" font-weight="600">solved by AdaL</text>

  <!-- Divider -->
  <line x1="40" y1="195" x2="860" y2="195" stroke="#222" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- AdaL convergence point -->
  <text x="450" y="225" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="600" opacity="0.7">AdaL sits where all three converge</text>

  <!-- Three pillars -->
  <!-- Autonomous -->
  <circle cx="220" cy="290" r="50" fill="none" stroke="#FF5898" stroke-width="2" opacity="0.8"/>
  <text x="220" y="285" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="14" font-weight="700">More</text>
  <text x="220" y="305" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="14" font-weight="700">Autonomous</text>
  <text x="220" y="360" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">loop engineering</text>
  <text x="220" y="375" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">runs while you sleep</text>

  <!-- Cost-effective -->
  <circle cx="450" cy="290" r="50" fill="none" stroke="#FF5898" stroke-width="2" opacity="0.8"/>
  <text x="450" y="285" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="14" font-weight="700">More</text>
  <text x="450" y="305" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="14" font-weight="700">Cost-Effective</text>
  <text x="450" y="360" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">smart model routing</text>
  <text x="450" y="375" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">no tier-1 token burning</text>

  <!-- Taste -->
  <circle cx="680" cy="290" r="50" fill="#FF5898" opacity="0.1" stroke="#FF5898" stroke-width="2.5"/>
  <text x="680" y="285" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="14" font-weight="700">More</text>
  <text x="680" y="305" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="14" font-weight="700">Taste</text>
  <text x="680" y="360" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">self-adapting</text>
  <text x="680" y="375" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">converges to your style</text>

  <!-- Convergence arrows -->
  <line x1="265" y1="295" x2="395" y2="290" stroke="#FF5898" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="500" y1="290" x2="630" y2="295" stroke="#FF5898" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
</svg>